<svg width="1440" height="720" viewBox="0 0 1440 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Quota Widget floating capsule mockup</title>
  <desc id="desc">An Excalidraw-style drawing of the Codex quota floating capsule on a macOS desktop.</desc>
  <defs>
    <filter id="sketch" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#2B261B" flood-opacity="0.18"/>
    </filter>
    <style>
      .hand {
        font-family: Virgil, "Comic Sans MS", "Bradley Hand", "PingFang SC", "Hiragino Sans GB", cursive;
      }
      .stroke {
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <rect width="1440" height="720" fill="#FFF8E8"/>
  <path d="M70 82C282 44 498 64 704 52C927 39 1150 51 1362 78" stroke="#E8DFC9" stroke-width="4" stroke-linecap="round"/>
  <path d="M92 643C310 675 544 650 771 662C984 674 1165 654 1346 630" stroke="#E8DFC9" stroke-width="4" stroke-linecap="round"/>

  <g filter="url(#sketch)">
    <text x="104" y="112" class="hand" fill="#1F2933" font-size="48" font-weight="700">Desktop capsule first</text>
    <text x="108" y="154" class="hand" fill="#5C6470" font-size="25">A tiny floating Codex quota pill that stays on your desktop while Codex is running.</text>
    <text x="108" y="191" class="hand" fill="#5C6470" font-size="25">No menu bar crowding. No hidden quota page. Just glance and keep going.</text>
  </g>

  <g filter="url(#shadow)" transform="rotate(-1.1 698 404)">
    <rect x="128" y="258" width="1096" height="338" rx="42" fill="#F4F0E7" stroke="#191B1E" stroke-width="4"/>
    <rect x="166" y="306" width="1020" height="248" rx="28" fill="#FAFCFB" stroke="#D7D1C3" stroke-width="3"/>

    <rect x="166" y="306" width="1020" height="38" rx="19" fill="#E8E5DD" stroke="#D7D1C3" stroke-width="2"/>
    <circle cx="196" cy="325" r="7" fill="#FF6B61"/>
    <circle cx="220" cy="325" r="7" fill="#FFCA55"/>
    <circle cx="244" cy="325" r="7" fill="#69D77B"/>
    <text x="280" y="333" class="hand" fill="#626B74" font-size="19">Codex</text>

    <path d="M221 402C368 374 503 393 651 379C815 364 971 375 1135 386" stroke="#E4E9EA" stroke-width="5" stroke-linecap="round"/>
    <path d="M229 487C405 464 582 478 771 461C905 449 1017 457 1130 472" stroke="#E4E9EA" stroke-width="5" stroke-linecap="round"/>
    <path d="M245 438C357 419 475 429 583 417" stroke="#D3DEDD" stroke-width="4" stroke-linecap="round"/>
    <path d="M676 528C808 511 960 519 1095 506" stroke="#D3DEDD" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)" transform="rotate(1.2 1035 244)">
    <path d="M905 215C963 209 1028 212 1087 211C1151 210 1213 211 1268 218C1284 233 1284 271 1269 286C1206 292 1144 287 1081 290C1016 293 958 289 903 284C891 263 890 235 905 215Z" fill="#16191B"/>
    <path class="stroke" d="M905 215C963 209 1028 212 1087 211C1151 210 1213 211 1268 218C1284 233 1284 271 1269 286C1206 292 1144 287 1081 290C1016 293 958 289 903 284C891 263 890 235 905 215Z" stroke="#0A0C0D" stroke-width="4"/>
    <circle cx="936" cy="250" r="8" fill="#70E08A"/>
    <text x="956" y="260" class="hand" fill="#F8F9F5" font-size="24" font-weight="700">5h 95%</text>
    <circle cx="1075" cy="250" r="8" fill="#70E08A"/>
    <text x="1095" y="260" class="hand" fill="#F8F9F5" font-size="24" font-weight="700">7D 81%</text>
  </g>

  <g filter="url(#sketch)">
    <path class="stroke" d="M874 322C900 302 917 283 928 264" stroke="#1F2933" stroke-width="4"/>
    <path class="stroke" d="M928 264C909 274 889 276 870 273" stroke="#1F2933" stroke-width="4"/>
    <text x="697" y="350" class="hand" fill="#1F2933" font-size="29" font-weight="700">Always-visible capsule</text>
    <text x="697" y="389" class="hand" fill="#5C6470" font-size="23">Shows the two numbers that matter most:</text>
    <text x="697" y="423" class="hand" fill="#5C6470" font-size="23">5h quota and 7D quota.</text>
  </g>

  <g filter="url(#sketch)">
    <path class="stroke" d="M103 610C222 590 340 597 462 586" stroke="#1F2933" stroke-width="3"/>
    <text x="104" y="650" class="hand" fill="#1F2933" font-size="30" font-weight="700">Touch Bar is optional. The desktop capsule is the main feature.</text>
  </g>
</svg>
